<!DOCTYPE html>
<html lang="zh-Hant">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>活動報名頁範例｜AI Builder Day</title><meta name="description" content="活動型 one-page 範例：亮點、議程、講者、票種、報名。" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body><div id="app">
    <header class="header" id="top"><div class="logo"><span class="logo-text">AI Builder Day 2026</span></div></header>
    <section class="hero"><h1 class="hero-title">一天掌握 AI 產品化關鍵</h1><p class="hero-subtitle">2026/05/18 · 台北松菸</p><div class="hero-ctas"><a href="#tickets" class="btn-primary">立即報名</a></div></section>
    <section class="section-what" id="highlights"><div class="section-header"><h2 class="section-title">活動亮點</h2></div><div class="cards-row">
      <article class="feature-card"><h3>12 場實戰分享</h3></article><article class="feature-card"><h3>3 大工作坊</h3></article><article class="feature-card"><h3>現場 Demo 區</h3></article>
    </div></section>
    <section class="section-apps" id="agenda"><div class="section-header"><h2 class="section-title">議程速覽</h2></div><div class="apps-grid"><div class="apps-col">
      <article class="app-card"><div class="app-content"><h4>09:30 Keynote</h4><p>AI Product Strategy</p></div></article>
      <article class="app-card"><div class="app-content"><h4>13:30 Workshop</h4><p>RAG from 0 to 1</p></div></article>
    </div></div></section>
    <section class="section-what" id="tickets"><div class="section-header"><h2 class="section-title">票種</h2></div><div class="cards-row">
      <article class="feature-card"><h3>早鳥票 NT$1,200</h3></article><article class="feature-card"><h3>一般票 NT$1,800</h3></article>
    </div></section>
    <section class="section-cta" id="cta"><h2>名額有限，售完即止</h2></section>
  </div><script type="module" src="/src/main.ts"></script></body>
</html>
