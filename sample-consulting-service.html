<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>顧問服務頁範例｜Growth Sprint</title>
    <meta name="description" content="服務型 one-page 範例：受眾、服務內容、流程、成果、CTA。" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body><div id="app">
    <header class="header" id="top"><div class="logo"><span class="logo-text">Growth Sprint</span></div></header>
    <section class="hero">
      <h1 class="hero-title">4 週內找出你的成長瓶頸</h1>
      <p class="hero-subtitle">給中小品牌的數位成長顧問服務</p>
      <div class="hero-ctas"><a href="#cta" class="btn-primary">預約 30 分鐘諮詢</a></div>
    </section>
    <section class="section-what" id="service"><div class="section-header"><h2 class="section-title">你會得到什麼</h2></div>
      <div class="cards-row">
        <article class="feature-card"><h3>漏斗健檢</h3><p>完整盤點流量到成交流程。</p></article>
        <article class="feature-card"><h3>實驗設計</h3><p>每週 2–3 個高優先測試。</p></article>
        <article class="feature-card"><h3>團隊共學</h3><p>交付 SOP 與決策框架。</p></article>
      </div>
    </section>
    <section class="section-apps" id="process"><div class="section-header"><h2 class="section-title">合作流程</h2></div>
      <div class="apps-grid"><div class="apps-col">
        <article class="app-card"><div class="app-content"><h4>Week 1｜診斷</h4><p>訪談＋資料檢視。</p></div></article>
        <article class="app-card"><div class="app-content"><h4>Week 2-3｜實驗</h4><p>落地測試並每週回顧。</p></div></article>
      </div><div class="apps-col">
        <article class="app-card"><div class="app-content"><h4>Week 4｜收斂</h4><p>成果彙整與下一季計畫。</p></div></article>
      </div></div>
    </section>
    <section class="section-cta" id="cta"><h2>如果你要的是可執行的方案，不只是報告</h2></section>
  </div><script type="module" src="/src/main.ts"></script></body>
</html>
